# Deep Native — single-page landing site.
# Compatible with the github-pages gem (Jekyll 3.10.x) for default Pages build.

title: "Deep Native Inc."
email: "info@deepnative.io"
description: >-
  Toronto-based consultancy and Microsoft Solutions Partner. AML modernization
  delivery, regulated-industry execution, Azure & AWS cloud-native engineering,
  and the open-source AML Open Framework.
keywords: >-
  AML, anti money laundering, AML modernization, financial crime, Azure, AKS,
  Kubernetes, payments, cloud-native, Microsoft Solutions Partner, Toronto,
  Deep Native, AML Open Framework, regulated industry, consulting
baseurl: ""
url: "https://deepnative.io"
logo: "/assets/images/header-logo.png"
cover_image: "/assets/images/og-cover.png"

twitter_username: deepnative
github_username: deepnative

permalink: /:title

markdown: kramdown
plugins:
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - Makefile
  - gulpfile.js
  - package.json
  - package-lock.json
  - node_modules
  - tests
  - playwright.config.ts
  - playwright-report
  - .lighthouserc.json
  - .htmlproofer.yml
  - README.md
  - CLAUDE.md
  - vendor
  - .bundle
