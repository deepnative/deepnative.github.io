name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Mirror the Makefile targets one-to-one. If a job here doesn't have a
# matching `make ci-<name>` target, that is a CI/local divergence — fix it.

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - run: make ci-build
      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: make ci-lint

  html:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - run: make ci-html

  links:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true # external link check is advisory
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - run: make ci-links

  a11y:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: make ci-a11y

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: make ci-e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true # advisory budget; tightens over time
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: make ci-lighthouse

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: make ci-security
