        A bounded, fixed-scope pilot that lands a specific modernization
        outcome — a cloud migration slice, data product, integration, delivery
        dashboard, or platform improvement. Transparent deliverables, defined
        exit criteria, and audit-aware execution.
      icon: "fa-flag-checkered"
    - title: "End-to-end resource augmentation"
      body: >-
        Flexible access to engineers, data scientists, developers, architects,
        QA, delivery leads, and domain specialists — onshore plus APAC offshore,
        with one accountable delivery lead and no third-party markup chains.
      icon: "fa-people-group"
  pricing_note: >-
    Competitive blended onshore + APAC offshore rates. Full rate card available
    on request.

