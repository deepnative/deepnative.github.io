<footer class="dn-footer" role="contentinfo">
  <div class="container">
    <div class="row">
      <div class="col-md-6">
        <div class="dn-footer__brand">
          <a href="{{ site.url }}{{ site.baseurl }}/" class="dn-wordmark dn-wordmark--footer" aria-label="{{ site.title }} home">
            <span class="dn-wordmark__mark" aria-hidden="true">DN</span>
            <span class="dn-wordmark__text">Deep Native</span>
          </a>
        </div>
        <p class="dn-footer__tagline">{{ site.data.site.footer.tagline }}</p>
        <ul class="dn-footer__social" aria-label="Social links">
          <li>
            <a href="{{ site.data.site.contact.github }}"
               rel="noopener"
               target="_blank"
               aria-label="Deep Native on GitHub">
              <i class="fab fa-github" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="{{ site.data.site.contact.linkedin }}"
               rel="noopener"
               target="_blank"
               aria-label="Deep Native on LinkedIn">
              <i class="fab fa-linkedin-in" aria-hidden="true"></i>
            </a>
          </li>
          <li>
            <a href="mailto:{{ site.data.site.contact.email }}"
               aria-label="Email Deep Native">
              <i class="fas fa-envelope" aria-hidden="true"></i>
            </a>
          </li>
        </ul>
      </div>
      <div class="col-md-6 text-md-right">
        <p>
          <strong>{{ site.title }}</strong><br />
          {{ site.data.site.contact.location }}<br />
          <a href="mailto:{{ site.data.site.contact.email }}">{{ site.data.site.contact.email }}</a>
        </p>
      </div>
    </div>
    <p class="dn-footer__disclaimer">{{ site.data.site.footer.disclaimer }}</p>
    <p class="dn-footer__copyright">© {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
  </div>
</footer>
